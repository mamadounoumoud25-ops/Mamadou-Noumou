databases:
  - name: ujad-pg
    plan: free

services:
  - type: web
    name: ujad-app
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 18.16.0
      - key: JWT_SECRET
        sync: false
      - key: RECOVERY_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ujad-pg
          property: connectionString
